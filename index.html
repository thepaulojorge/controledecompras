<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Controle de Compras - Japão 2028</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#c0392b">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/style.css">
</head>
<body class="theme-default">

  <header>
    <div class="header-inner">
      <div class="header-title">
        <span class="header-icon">🇯🇵</span>
        <div>
          <h1>Controle de Compras</h1>
          <p class="header-sub">Japão 2028</p>
        </div>
      </div>
      <div id="themeSelector">
        <button data-theme="default" title="Tema Padrão">🌸</button>
        <button data-theme="dark" title="Dark Mode">🌑</button>
        <button data-theme="viagem" title="Tema Viagem">🌊</button>
        <button data-theme="minimalista" title="Minimalista">⬜</button>
      </div>
    </div>
  </header>

  <main>

    <!-- Configuração de limite + taxa -->
    <section class="config-bar">
      <div class="config-item">
        <label for="limiteUSD">Limite (USD):</label>
        <input type="number" id="limiteUSD" value="1000" min="1" step="10">
      </div>
      <div class="config-item taxa-info">
        <span id="taxaInfo">Carregando taxas...</span>
        <button id="btnAtualizarTaxa" title="Atualizar taxas de câmbio">↻ Atualizar</button>
      </div>
    </section>

    <!-- Formulário -->
    <form id="formCompra" class="form-box">
      <div class="form-row">
        <div class="form-group">
          <label for="item">Item:</label>
          <input type="text" id="item" placeholder="Ex: Câmera Sony" autocomplete="off" required>
        </div>
        <div class="form-group">
          <label for="categoria">Categoria:</label>
          <select id="categoria">
            <option value="Eletrônicos">🔌 Eletrônicos</option>
            <option value="Roupas">👘 Roupas</option>
            <option value="Alimentação">🍜 Alimentação</option>
            <option value="Cosméticos">💄 Cosméticos</option>
            <option value="Souvenirs">🎌 Souvenirs</option>
            <option value="Outros">📦 Outros</option>
          </select>
        </div>
        <div class="form-group">
          <label for="valorJPY">Valor em JPY (¥):</label>
          <input type="number" id="valorJPY" step="1" min="1" placeholder="Ex: 5000" required>
        </div>
        <div class="form-group button-group">
          <label>&nbsp;</label>
          <button type="submit" id="btnSubmit">＋ Adicionar</button>
        </div>
      </div>
    </form>

    <!-- Busca e resumo -->
    <div class="toolbar">
      <div class="busca-wrap">
        <span class="busca-icon">🔍</span>
        <input type="text" id="busca" placeholder="Buscar item ou categoria...">
      </div>
      <div class="resumo-categorias" id="resumoCategorias"></div>
    </div>

    <!-- Tabela -->
    <div class="table-wrap">
      <table id="tabelaCompras">
        <thead>
          <tr>
            <th>Item</th>
            <th>Categoria</th>
            <th>JPY (¥)</th>
            <th>USD ($)</th>
            <th>BRL (R$)</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
      <p class="empty-msg" id="emptyMsg">Nenhuma compra registrada ainda.</p>
    </div>

    <!-- Barra de progresso + total -->
    <div class="progress-section">
      <div class="progress-labels">
        <span id="totalLabel">Total: $0.00</span>
        <span id="limiteLabel">Limite: $1000.00</span>
      </div>
      <div id="progressContainer">
        <div id="progressBar"></div>
      </div>
      <div id="total">$0.00 / $1000.00 — <span id="percentLabel">0%</span> do limite</div>
    </div>

    <!-- Botões de ação -->
    <div class="actions-bar">
      <button id="btnExportCSV">⬇ Exportar CSV</button>
      <button id="btnLimpar" class="btn-danger">🗑 Limpar tudo</button>
    </div>

  </main>

  <!-- Toast de notificação -->
  <div id="toast" class="toast" role="alert" aria-live="polite"></div>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./service-worker.js")
        .then(() => console.log("Service Worker registrado!"))
        .catch((err) => console.error("Erro no Service Worker:", err));
    }
  </script>
  <script src="./javascript/script.js"></script>
</body>
</html>
